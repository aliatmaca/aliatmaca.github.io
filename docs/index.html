<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAFo9M/3AAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAABLSURBVChTxY7RDgAQCEX7/59GFnNZrTZxntx0KgJKQ57CWYljz4hvMI34uBzCd4AwAhQtoNFtvcVzltpzVebMSOzseaJ+LOTInyGqOQBfoaZXuG8AAAAASUVORK5CYII=" />
<title>Ana Sayfa</title>
<style>
  body {
    font-family: 'IBM Plex Sans Cond Text', 'Roboto Condensed', 'Segoe UI', sans-serif;
    font-weight: bold;
    font-size: 14px;
    color: white;
    background: rgb(0,162,255);
    background: linear-gradient(90deg, rgba(0,162,255,1) 0%, rgba(0,255,238,1) 100%);
    margin: 0;
    padding: 0;
  }
  #bar {
    background: #313233;
    opacity: 0.88;
    border-radius: 12px;
    margin: 6px 6px;
    margin-top: 6px;
    padding: 8px 16px;
    height: 20px;
    display: flex;
    flex-wrap: nowrap;
    justify-content: space-between;
    align-items: center;
  }
  #clock {
    display: flex;
    align-items: center;
    flex-basis: 100%;
    justify-content: left;
    margin-top: 0px;
    order: 1;
  }
  #search {
    display: flex;
    align-items: center;
    flex-basis: 100%;
    justify-content: right;
    margin-top: 0px;
    order: 2;
  }
  #search-input {
    background: #343536;
    color: white;
    width: 96px;
    padding: 8px;
    border-radius: 8px;
    border: none;
  }
  #search-engine {
    background: #343536;
    color: white;
    padding: 8px;
    margin-left: 10px;
    border-radius: 8px;
    border: none;
  }
  @media (min-width: 600px) {
    #clock {
      display: flex;
      align-items: center;
      flex-basis: 100%;
      justify-content: left;
      margin-top: 0px;
      order: 1;
    }
    #search-bar {
      flex-basis: auto;
      font-size: 14px;
      margin-top: 0;
      order: 2;
    }
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    padding: 16px;
    max-width: 1000px;
    margin: 10px auto;
  }
  .fav {
    background: #313233;
    color: white;
    border: none;
    border-radius: 5px;
    padding: 4px;
    cursor: pointer;
    transition: background 0.3s ease;
  }
  .fav:hover {
    background: #0069ff;
  }
</style>
</head>
<body>

<div id="bar">
  <div id="clock" title="6.0.2449a - 7/12/24"></div>
  <div id="search">
    <input type="text" id="search-input" placeholder="Ara">
    <select id="search-engine">
      <option value="https://google.com.tr/search?q=">G</option>
      <option value="https://duckduckgo.com/?q=">Duck</option>
      <option value="https://lite.duckduckgo.com/lite/?q=">Duck Lite</option>
      <option value="https://www.bing.com/search?q=">Bing</option>
      <option value="https://archive.org/search?query=">Arşiv</option>
    </select>
    <button class="fav" onclick="search()">></button>
  </div>
</div>

<div id="grid">
  <!-- Google -->
  <button class="fav" onclick="window.location.href='https://google.com.tr';">Google</button>
  <button class="fav" onclick="window.location.href='https://mail.google.com';">Gmail</button>
  <button class="fav" onclick="window.location.href='https://drive.google.com';">G Drive</button>
  <button class="fav" onclick="window.location.href='https://photos.google.com';">G Foto</button>
  <button class="fav" onclick="window.location.href='https://gemini.google.com';">Gemini</button>
  <!-- Msft -->
  <button class="fav" onclick="window.location.href='https://bing.com';">Bing</button>
  <button class="fav" onclick="window.location.href='https://outlook.live.com';">Outlook</button>
  <button class="fav" onclick="window.location.href='https://onedrive.live.com';">OneDrive</button>
  <button class="fav" onclick="window.location.href='https://onenote.com';">OneNote</button>
  <button class="fav" onclick="window.location.href='https://copilot.microsoft.com';">Copilot</button>
  <!-- SosMed -->
  <button class="fav" onclick="window.location.href='https://youtube.com;">YouTube</button>
  <button class="fav" onclick="window.location.href='https://bsky.app';">Bluesky</button>
  <button class="fav" onclick="window.location.href='https://old.reddit.com';">Reddit</button>
  <button class="fav" onclick="window.location.href='https://music.youtube.com/';">YT Music</button>
  <button class="fav" onclick="window.location.href='https://web.whatsapp.com';">WhatsApp</button>
</div>

<script>
function updateClock() {
  var now = new Date();
  var hours = now.getHours();
  var minutes = now.getMinutes();
  var seconds = now.getSeconds();
  var day = now.getDate();
  var month = now.toLocaleString('default', { month: 'short' });
  var weekday = now.toLocaleString('default', { weekday: 'short' });
  document.getElementById('clock').textContent = 
    (hours < 10 ? '0' : '') + hours + ':' +
    (minutes < 10 ? '0' : '') + minutes + ':' +
    (seconds < 10 ? '0' : '') + seconds + ' • ' +
    day + ' ' + month + ' ' + weekday;
}
setInterval(updateClock, 1000);

function search() {
  var query = document.getElementById('search-input').value;
  var engine = document.getElementById('search-engine').value;
  window.location.href = engine + encodeURIComponent(query);
}
</script>

</body>
</html>
